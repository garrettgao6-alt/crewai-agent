name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/server_key
          chmod 600 ~/.ssh/server_key
          ssh-keyscan -H 170.64.131.149 >> ~/.ssh/known_hosts

      - name: Debug SSH Fingerprint
        run: |
          ssh-keygen -lf ~/.ssh/server_key || true

      - name: Test SSH
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/server_key -o IdentitiesOnly=yes root@170.64.131.149 'echo "SSH SUCCESS"'

      - name: Deploy
        shell: bash
        run: |
          set -euo pipefail
          ssh -i ~/.ssh/server_key -o IdentitiesOnly=yes root@170.64.131.149 'bash -se' << 'EOF'
            set -euo pipefail

            cd /root/crewai-agent
            git fetch origin
            git reset --hard origin/main

            chmod +x /root/crewai-agent/deploy.sh
            cp /root/crewai-agent/webhook.json /root/webhook.json
            install -m 0644 /root/crewai-agent/deploy/garrett-api.service /etc/systemd/system/garrett-api.service
            install -m 0644 /root/crewai-agent/deploy/crewai.service /etc/systemd/system/crewai.service

            systemctl daemon-reload
            systemctl enable garrett-api
            systemctl enable crewai
            systemctl disable --now garrett-streamlit || true
            systemctl enable webhook
            systemctl restart webhook

            /root/crewai-agent/deploy.sh
          EOF
