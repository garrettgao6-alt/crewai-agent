name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 170.64.131.149
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/crewai-agent
            git pull
            pkill -9 -f streamlit || true
            pkill -9 -f uvicorn || true
            nohup ./venv/bin/uvicorn api:app --host 0.0.0.0 --port 8000 &
            nohup ./venv/bin/streamlit run streamlit_app.py --server.address 0.0.0.0 --server.port 8501 &
